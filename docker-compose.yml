# This file is used to specify the Docker Compose configuration for the AuditAI project.
# It allows you to run the application and its dependencies in a containerized environment.

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: auditai-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-auditai_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # AuditAI API
  api:
    container_name: auditai-api
    build:
      context: .
      dockerfile: src/AuditAI.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${DB_NAME:-auditai_dev};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-changeme}
      - Jwt__Secret=${JWT__SECRET}
      - Jwt__Issuer=${JWT__ISSUER}
      - Jwt__Audience=${JWT__AUDIENCE}
      - Jwt__ExpirationMinutes=${JWT__EXPIRATION_MINUTES:-60}
    depends_on:
      - postgres
    restart: on-failure

volumes:
  postgres_data:
    driver: local
